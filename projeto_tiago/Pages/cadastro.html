<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Cadastro</title>

  <link rel="stylesheet"
  href="../CSS/auth.css">

</head>

<body>

<div class="auth-container">

  <div class="auth-card">

    <h1>
      Criar Conta
    </h1>

    <p>
      Crie sua conta para agendar consultas.
    </p>

    <form id="cadastroForm">

      <input
      type="text"
      id="nome"
      placeholder="Seu nome"
      required>

      <input
      type="email"
      id="emailCadastro"
      placeholder="Seu email"
      required>

      <input
      type="password"
      id="senhaCadastro"
      placeholder="Sua senha"
      required>

      <button type="submit">
        Criar conta
      </button>

    </form>

    <span>

      Já possui conta?

      <a href="login.html">
        Entrar
      </a>

    </span>

  </div>

</div>

<script src="../JS/auth.js"></script>

</body>
</html>
