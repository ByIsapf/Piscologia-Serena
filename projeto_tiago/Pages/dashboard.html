<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <link rel="stylesheet"
  href="../CSS/style.css">

</head>

<body>

<section class="hero">

  <div class="hero-text">

    <p class="mini-title">
      Área do Paciente
    </p>

    <h1>

      Bem-vindo ao
      <span>Painel</span>

    </h1>

    <p class="description">

      Aqui você poderá visualizar suas consultas e agendamentos.

    </p>

    <div class="hero-buttons">

      <a href="agenda.html">

        <button class="primary-btn">

          Ver Agenda

        </button>

      </a>

      <button
      class="secondary-btn"
      onclick="logout()">

        Sair

      </button>

    </div>

  </div>

</section>

<script>

const logado =
localStorage.getItem("logado");

if(logado !== "true"){

  window.location.href =
  "login.html";

}

function logout(){

  localStorage.removeItem("logado");

  window.location.href =
  "login.html";

}

</script>

</body>
</html>
