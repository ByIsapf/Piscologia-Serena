<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <link rel="stylesheet"
  href="../CSS/auth.css">

</head>

<body>

<div class="auth-container">

  <div class="auth-card">

    <h1>
      Entrar
    </h1>

    <p>
      Faça login para acessar suas consultas.
    </p>

    <form id="loginForm">

      <input
      type="email"
      id="email"
      placeholder="Seu email"
      required>

      <input
      type="password"
      id="senha"
      placeholder="Sua senha"
      required>

      <button type="submit">
        Entrar
      </button>

    </form>

    <span>

      Não possui conta?

      <a href="cadastro.html">
        Criar conta
      </a>

    </span>

  </div>

</div>

<script src="../JS/auth.js"></script>

</body>
</html>
